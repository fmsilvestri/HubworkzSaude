kind = "web"
previewPath = "/paciente-app/"
title = "HubWorkz App Paciente"
version = "1.0.0"
id = "artifacts/paciente-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/paciente-app/" ]
localPort = 21195

[services.development]
run = "pnpm --filter @workspace/paciente-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/paciente-app", "run", "build" ]
publicDir = "artifacts/paciente-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21195"
BASE_PATH = "/paciente-app/"
