kind = "web"
previewPath = "/"
title = "HubWorkz Saúde"
version = "1.0.0"
id = "artifacts/hubworkz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20742

[services.development]
run = "pnpm --filter @workspace/hubworkz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hubworkz", "run", "build" ]
publicDir = "artifacts/hubworkz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20742"
BASE_PATH = "/"
